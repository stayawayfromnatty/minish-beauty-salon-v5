workflows:
  ios-build:
    name: Minish Salon iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html app.js styles.css logo.jpeg confetti.browser.min.js www/
          cp -r fonts www/ 2>/dev/null || true

      - name: Capacitor Sync
        script: |
          npx cap add ios || true
          npx cap sync ios
          # Verify the workspace exists
          find . -name "*.xcworkspace"

      - name: Build unsigned IPA
        script: |
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: Could not find .xcworkspace file"
            exit 1
          fi
          echo "Found workspace at: $WORKSPACE"
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios_export_options.plist

    artifacts:
      - build/ipa/*.ipa
      - build/ipa/*.xcarchive

    publishing:
      email:
        recipients:
          - placeholder@email.com
        notify:
          success: true
          failure: true
