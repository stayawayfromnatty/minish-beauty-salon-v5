workflows:
  ios-build:
    name: Minish Salon iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios@latest

      - name: Prepare web assets
        script: |
          mkdir -p www
          # Copy every web-relevant file to the distribution folder
          cp index.html app.js styles.css logo.jpeg manifest.json confetti.browser.min.js www/
          cp -r fonts www/ 2>/dev/null || true
          # List files for verification in logs
          ls -R www

      - name: Capacitor Setup
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Build and Package
        script: |
          # Use Capacitor CLI top-level sync to ensure native project is updated
          npx cap update ios
          
          echo "Finding workspace..."
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: Could not find .xcworkspace"
            exit 1
          fi

          echo "Building Archive..."
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "Creating Universal IPA..."
          mkdir -p build/ipa/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/ipa/Payload/
          cd build/ipa
          # The -r flag is recursive, NO -k (DOS) flag
          zip -r MinishSalon-unsigned.ipa Payload

    artifacts:
      - build/ipa/*.ipa
      - build/ipa/*.xcarchive

    publishing:
      email:
        recipients:
          - placeholder@email.com
        notify:
          success: true
          failure: true
